<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>游戏公司 HR 人才测评工具</title>
  <style>
    :root {
      --ink: #182230;
      --muted: #667085;
      --line: #d6dde8;
      --bg: #f4f7fa;
      --panel: #fff;
      --primary: #166270;
      --green: #2d7a5f;
      --amber: #b86820;
      --blue: #315f9d;
      --red: #a84454;
      --shadow: 0 20px 55px rgba(21, 35, 55, .12);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(140deg, #e6f1f3 0%, #f6f8fb 38%, #f7efe7 100%);
      min-height: 100vh;
    }
    button, input, textarea, select { font: inherit; }
    .app { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 24px 0 40px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .brand { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .mark { width: 44px; height: 44px; border-radius: 8px; display: grid; place-items: center; color: #fff; background: linear-gradient(135deg, var(--primary), var(--green)); font-weight: 900; }
    h1 { margin: 0; font-size: clamp(22px, 3vw, 34px); line-height: 1.15; letter-spacing: 0; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; line-height: 1.55; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      min-height: 42px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .layout { display: grid; grid-template-columns: 290px 1fr; gap: 16px; align-items: start; }
    .panel { background: var(--panel); border: 1px solid rgba(24, 34, 48, .08); border-radius: 8px; box-shadow: var(--shadow); }
    .side { padding: 16px; position: sticky; top: 12px; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 13px; color: #344054; font-weight: 800; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      outline: none;
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 104px; resize: vertical; line-height: 1.6; }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(22, 98, 112, .12); }
    .progress-meta { display: flex; justify-content: space-between; color: var(--muted); font-size: 13px; margin: 12px 0 8px; }
    .progress { height: 9px; border-radius: 999px; overflow: hidden; background: #e8eef5; position: relative; }
    .progress span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--green), var(--amber), var(--primary)); background-size: 180% 100%; transition: width .28s ease; animation: progressFlow 3s linear infinite; }
    .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 14px; }
    .tab { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 9px 8px; cursor: pointer; font-weight: 800; color: var(--muted); }
    .tab.active { color: #fff; border-color: var(--primary); background: var(--primary); }
    .notice { color: var(--muted); font-size: 13px; line-height: 1.6; margin-top: 12px; }
    .main { overflow: hidden; }
    body[data-view="answer"] {
      background: linear-gradient(180deg, #cfead5 0%, #edf3d4 100%);
    }
    body[data-view="answer"] .app {
      width: min(920px, calc(100% - 28px));
      padding-top: 28px;
    }
    body[data-view="answer"] .topbar,
    body[data-view="answer"] .side,
    body[data-view="answer"] .toolbar,
    body[data-view="answer"] .nav {
      display: none;
    }
    body[data-view="answer"] .layout {
      display: block;
    }
    body[data-view="answer"] .panel.main {
      border: 0;
      box-shadow: none;
      background: transparent;
    }
    body[data-mode="candidate"] .topbar,
    body[data-mode="candidate"] .side,
    body[data-mode="candidate"] .toolbar,
    body[data-mode="candidate"] .nav,
    body[data-mode="candidate"] .floating-tabs {
      display: none !important;
    }
    body[data-mode="candidate"] .app {
      width: min(920px, calc(100% - 28px));
      padding-top: 28px;
    }
    body[data-mode="candidate"] .layout {
      display: block;
    }
    body[data-mode="candidate"] .panel.main {
      border: 0;
      box-shadow: none;
      background: transparent;
    }
    body[data-mode="candidate"][data-view="candidate"] {
      background: linear-gradient(115deg, #a7bdc0 0%, #d7e3db 54%, #f2eddc 100%);
    }
    body[data-mode="candidate"][data-view="candidate"] .app {
      width: min(760px, 100%);
      padding: 0;
    }
    body[data-mode="candidate"][data-view="candidate"] .report {
      padding: 0;
    }
    body[data-mode="candidate"][data-view="candidate"] .candidate-stage {
      border-radius: 0;
      min-height: 100vh;
    }
    body[data-mode="hr"] {
      background: #eef6ee;
    }
    body[data-mode="hr"] .floating-tabs,
    body[data-mode="hr"] .topbar,
    body[data-mode="hr"] .side,
    body[data-mode="hr"] .toolbar,
    body[data-mode="hr"] .question-area,
    body[data-mode="hr"] .nav {
      display: none !important;
    }
    body[data-mode="hr"] .app {
      width: min(1040px, calc(100% - 32px));
      padding: 24px 0 48px;
    }
    body[data-mode="hr"] .layout {
      display: block;
    }
    body[data-mode="hr"] .panel.main {
      border: 0;
      box-shadow: none;
      background: transparent;
    }
    body[data-mode="hr"] .report {
      display: block;
      padding: 0;
    }
    .floating-tabs {
      display: none;
      position: fixed;
      top: 16px;
      right: 18px;
      z-index: 50;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      box-shadow: 0 16px 34px rgba(21,35,55,.14);
      backdrop-filter: blur(12px);
    }
    body[data-view="answer"] .floating-tabs { display: flex; }
    .floating-tab {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: transparent;
      color: #344054;
      font-weight: 900;
      cursor: pointer;
    }
    .floating-tab.active {
      background: #1f3b3d;
      color: #fff;
    }
    .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid rgba(24,34,48,.08); gap: 12px; }
    .section-kicker { color: var(--primary); font-size: 13px; font-weight: 900; }
    .question-area {
      padding: 28px 18px 34px;
      min-height: 760px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, #d9efdc 0%, #eef5d7 100%);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .question-area::before {
      content: "";
      position: absolute;
      inset: -30%;
      background: repeating-linear-gradient(115deg, transparent 0 34px, rgba(45,122,95,.07) 34px 36px);
      opacity: .55;
      transform: translate3d(0,0,0);
      animation: answerDrift 18s linear infinite;
      z-index: -1;
      pointer-events: none;
    }
    .answer-trail { display: none; }
    .answer-trail span {
      width: 11px;
      height: 11px;
      border: 2px solid rgba(22,98,112,.4);
      background: rgba(255,255,255,.78);
      transform: rotate(45deg);
      animation: trailStep 1.8s ease-in-out infinite;
      animation-delay: calc(var(--i) * .18s);
    }
    .game-card {
      width: min(100%, 1080px);
      min-height: 660px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 30px;
      background: url("talent_tool_assets/answer_scene_cloud_realm.png") center / cover no-repeat;
      box-shadow: 0 28px 70px rgba(54, 83, 64, .22);
      backdrop-filter: blur(12px);
      position: relative;
    }
    .game-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(226,238,236,.46) 0%, rgba(236,245,242,.2) 42%, rgba(255,255,255,.08) 100%);
      pointer-events: none;
    }
    .game-head {
      position: relative;
      z-index: 8;
      width: min(45%, 430px);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 20px 6px;
    }
    .game-kicker { font-size: 16px; line-height: 1.25; font-weight: 900; color: #1f2933; }
    .game-candidate-pill { flex: 0 0 auto; border-radius: 999px; padding: 7px 11px; background: rgba(255,255,255,.92); color: #5c6670; font-size: 13px; font-weight: 900; }
    .game-progress-line { height: 7px; border-radius: 999px; background: rgba(255,255,255,.85); overflow: hidden; margin-top: 10px; }
    .game-progress-line span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, #71b78e, #d2b25b, #8a76c8); transition: width .32s ease; }
    .game-question-panel {
      position: relative;
      z-index: 8;
      width: min(54%, 580px);
      margin: 6px auto 18px;
      padding: 11px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.76);
      box-shadow: 0 18px 42px rgba(22,45,58,.14);
      backdrop-filter: blur(10px);
    }
    .game-meta-row { display: flex; justify-content: space-between; gap: 8px; color: #667085; font-size: 12px; font-weight: 900; margin-bottom: 5px; }
    .quest-hud {
      display: none;
    }
    .quest-top { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 16px; }
    .quest-label { color: var(--primary); font-size: 13px; font-weight: 900; }
    .quest-title { margin-top: 2px; font-size: 20px; font-weight: 900; }
    .quest-status { color: #667085; font-size: 13px; font-weight: 800; text-align: right; }
    .quest-map {
      position: relative;
      height: 68px;
      padding-top: 22px;
    }
    .quest-track {
      position: absolute;
      left: 6%;
      right: 6%;
      top: 35px;
      height: 8px;
      border-radius: 999px;
      background: #dfe8e8;
      overflow: hidden;
    }
    .quest-fill {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2f6f73, #6ca36f, #b9873a);
      transition: width .32s ease;
    }
    .quest-runner {
      position: absolute;
      top: 18px;
      left: 6%;
      width: 34px;
      height: 34px;
      border: 3px solid #1f3b3d;
      border-radius: 10px;
      background: #fff;
      color: var(--primary);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(21,35,55,.16);
      transform: translateX(-50%);
      transition: left .32s cubic-bezier(.2,.8,.2,1);
      animation: runnerBounce 1.6s ease-in-out infinite;
      z-index: 2;
    }
    .quest-nodes { position: relative; display: grid; grid-template-columns: repeat(4, 1fr); z-index: 3; }
    .quest-node { text-align: center; color: #667085; font-size: 12px; font-weight: 900; }
    .quest-dot {
      width: 24px;
      height: 24px;
      border: 3px solid #cfd9dc;
      background: #fff;
      border-radius: 50%;
      margin: 0 auto 8px;
      transition: transform .2s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .quest-node.passed .quest-dot { border-color: #2d7a5f; background: #2d7a5f; box-shadow: 0 0 0 5px rgba(45,122,95,.12); }
    .quest-node.active .quest-dot { border-color: #b9873a; background: #fff3cc; box-shadow: 0 0 0 7px rgba(185,135,58,.16); transform: scale(1.08); }
    .quest-node.passed, .quest-node.active { color: #1f3b3d; }
    .level-scene {
      position: absolute;
      inset: 0;
      min-height: 660px;
      height: auto;
      border: 0;
      border-radius: 0;
      overflow: hidden;
      margin: 0;
      background: transparent;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }
    .level-scene::before { content: none; }
    .level-scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 36%, rgba(111,157,184,.22) 0 10%, transparent 28%),
        radial-gradient(circle at 44% 28%, rgba(255,255,255,.95) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 18%, rgba(255,255,255,.8) 0 2px, transparent 3px);
      opacity: .9;
      animation: sceneSpark 2.4s ease-in-out infinite;
      pointer-events: none;
    }
    .level-scene.stage-1 { filter: hue-rotate(0deg); }
    .level-scene.stage-2 { filter: hue-rotate(22deg) saturate(1.04); }
    .level-scene.stage-3 { filter: hue-rotate(-18deg) saturate(1.05); }
    .level-scene.stage-4 { filter: hue-rotate(42deg) saturate(1.05); }
    .scene-card {
      position: absolute;
      left: 26px;
      top: 24px;
      z-index: 2;
      color: #1f3b3d;
      font-weight: 900;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.7);
    }
    .scene-card small { display: block; color: #667085; font-size: 12px; margin-top: 4px; }
    .scene-runner { display: none; }
    .scene-runner-img {
      position: absolute;
      left: var(--runner-left, 50%);
      bottom: 150px;
      z-index: 6;
      width: 190px;
      height: 190px;
      object-fit: contain;
      transform: translateX(calc(-50% + var(--runner-shift, 0px)));
      filter: none;
      animation: runnerBob .58s ease-in-out infinite alternate;
      transition: left .32s cubic-bezier(.2,.8,.2,1), transform .32s cubic-bezier(.2,.8,.2,1);
    }
    .scene-gate { display: none; }
    .scene-gate span { display: none; }
    .scene-flag { display: none; }
    .scene-flag::after { content: none; }
    .answer-animate .level-scene { animation: sceneEnter .38s cubic-bezier(.2,.8,.2,1) both; }
    .scene-choice-layer {
      position: absolute;
      left: 50%;
      bottom: 66px;
      z-index: 7;
      width: min(58%, 620px);
      min-height: 74px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 3vw, 42px);
      pointer-events: none;
    }
    .scene-choice {
      position: static;
      flex: 0 0 auto;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.9);
      background: rgba(255,255,255,.78);
      color: #415452;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
      box-shadow: 0 8px 24px rgba(61,81,55,.18);
      pointer-events: auto;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .scene-choice:hover { transform: translateY(-5px); background: #fff; box-shadow: 0 14px 30px rgba(19,47,68,.24); }
    .scene-choice.selected { background: #fff1a8; border-color: #fff; box-shadow: 0 0 0 6px rgba(255,241,168,.3), 0 14px 30px rgba(19,47,68,.24); }
    .answer-animate .scene-runner-img { animation: runnerCross .78s cubic-bezier(.2,.8,.2,1) both, runnerBob .58s ease-in-out .78s infinite alternate; }
    .answer-animate .scene-gate { animation: gatePulse .72s ease both; }
    .question-title { margin: 0 0 8px; padding-right: 0; font-size: clamp(15px, 1.45vw, 18px); line-height: 1.2; letter-spacing: 0; }
    .answer-animate .question-title { animation: answerIn .36s cubic-bezier(.2,.8,.2,1) both; }
    .options { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px 8px; }
    .option {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 34px;
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      gap: 9px;
      padding: 6px 8px;
      cursor: pointer;
      background: #fff;
      font-size: 12px;
      font-weight: 900;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .answer-animate .option { animation: optionIn .32s cubic-bezier(.2,.8,.2,1) both; animation-delay: calc(var(--i) * 42ms); }
    .option:hover { border-color: rgba(22,98,112,.45); background: #f8fbfc; transform: translateX(4px); box-shadow: 0 10px 24px rgba(21,35,55,.08); }
    .option.selected { border-color: var(--primary); background: rgba(22,98,112,.08); box-shadow: 0 0 0 3px rgba(22,98,112,.08); }
    .letter { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; border: 1px solid var(--line); font-weight: 900; color: var(--muted); transition: transform .18s ease, background .18s ease, color .18s ease, border-color .18s ease; }
    .option.selected .letter { background: var(--primary); border-color: var(--primary); color: #fff; }
    .option.selected .letter { animation: letterPop .22s ease; }
    .nav { display: flex; justify-content: space-between; gap: 10px; padding: 16px 18px 18px; border-top: 1px solid rgba(24,34,48,.08); background: #fbfcfe; }
    .nav .btn { transition: transform .18s ease, box-shadow .18s ease, background .18s ease; }
    .nav .btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(21,35,55,.08); }
    .report { display: none; padding: 18px; }
    .report.active { display: block; }
    .report-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .card { border: 1px solid var(--line); border-radius: 8px; padding: 15px; background: #fff; }
    .card h3 { margin: 0 0 10px; font-size: 18px; }
    .hero-card { grid-column: 1 / -1; display: grid; grid-template-columns: 1.25fr .75fr; gap: 14px; align-items: center; background: linear-gradient(135deg, #ffffff 0%, #edf7f5 100%); }
    .spirit-art { width: min(100%, 360px); margin: 0 auto; display: block; border-radius: 8px; object-fit: contain; mix-blend-mode: multiply; }
    .reference-img { width: 100%; border: 1px solid var(--line); border-radius: 8px; display: block; background: #fff; }
    .submission-dock {
      border: 1px solid #d3e2d4;
      background: rgba(255,255,255,.92);
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(42, 70, 55, .08);
    }
    .submission-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .submission-title { font-size: 20px; font-weight: 900; }
    .submission-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .submission-list { display: grid; gap: 8px; }
    .submission-empty { color: #667085; font-weight: 800; padding: 10px 0; }
    .submission-item {
      width: 100%;
      border: 1px solid #d7ded9;
      background: #fff;
      color: var(--ink);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
    }
    .submission-item:hover { background: #f4faf8; border-color: #93bfb7; }
    .submission-item.active { border-color: #547b68; box-shadow: inset 0 0 0 1px #547b68; background: #edf7ef; }
    .submission-name { display: block; font-weight: 900; margin-bottom: 3px; }
    .submission-meta { color: #667085; font-size: 13px; font-weight: 800; }
    .submission-badge { border-radius: 999px; background: #e8f4f1; color: #166270; padding: 5px 9px; font-size: 12px; font-weight: 900; white-space: nowrap; }
    .hr-sheet {
      background: #f1f8ef;
      border: 1px solid #d7e6d6;
      border-radius: 8px;
      padding: 28px 48px 46px;
      min-height: 980px;
      box-shadow: 0 18px 50px rgba(38, 65, 48, .10);
      color: #17212b;
    }
    .hr-sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 28px;
    }
    .hr-brand { display: flex; gap: 10px; align-items: center; color: #1d2a33; font-weight: 800; }
    .hr-logo {
      width: 22px;
      height: 22px;
      border-radius: 2px;
      background: linear-gradient(135deg, #88bd5e, #73492e);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 900;
    }
    .hr-title { margin: 0; font-size: 18px; font-weight: 900; }
    .hr-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .hr-action {
      border: 1px solid #aebfad;
      border-radius: 6px;
      background: rgba(255,255,255,.72);
      font-weight: 900;
      min-width: 48px;
      height: 34px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: #25323a;
      padding: 0 10px;
    }
    .hr-action:hover { background: #fff; border-color: #6f8f75; }
    .hr-candidate-line,
    .hr-main-type {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin: 18px 0;
    }
    .hr-main-type { margin-top: 32px; }
    .hr-trait-strip {
      width: min(620px, 100%);
      margin: 44px auto 40px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
      text-align: center;
    }
    .hr-trait-name,
    .hr-trait-value {
      display: block;
      font-size: 16px;
      font-weight: 800;

      to { opacity: 1; transform: translateY(0); }

<body>
  <main class="app">
    <div class="floating-tabs" aria-label="页面切换">
      <button class="floating-tab active" data-view="answer" type="button">答题</button>
      <button class="floating-tab" data-view="candidate" type="button">候选人</button>
      <button class="floating-tab" data-view="hr" type="button">HR</button>
      <button class="floating-tab" data-action="print" type="button">打印</button>
    </div>
    <header class="topbar">
      <div class="brand">
        <div class="mark">HR</div>
        <div>
          <h1>游戏公司 HR 人才测评工具</h1>
          <p class="subtitle">基于 60 题职业倾向测评，自动生成候选人画像、岗位适配、面试追问与培养建议。</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn" id="sampleBtn" type="button">填入演示答案</button>
        <button class="btn" id="resetBtn" type="button">清空</button>
        <button class="btn primary" id="printBtn" type="button">打印当前报告</button>
      </div>
    </header>

    <div class="layout">
      <aside class="panel side">
        <div class="field">
          <label for="candidateName">候选人姓名</label>
          <input id="candidateName" placeholder="例如：李想">
        </div>
        <div class="field">
          <label for="candidateRole">目标岗位</label>
          <input id="candidateRole" placeholder="例如：招聘 HR / HRBP">
        </div>
        <div class="field">
          <label for="candidateYears">工作年限</label>
          <input id="candidateYears" placeholder="例如：3 年">
        </div>
        <div class="field">
          <label for="assessmentDate">测评日期</label>
          <input id="assessmentDate" type="date">
        </div>
        <div class="field">
          <label for="openAnswer">开放题补充</label>
          <textarea id="openAnswer" placeholder="可记录候选人对游戏公司 HR 价值、优势与待提升点的回答。"></textarea>
        </div>
        <div class="progress-meta"><span id="progressText">准备开始</span><span id="answerCount">0/60</span></div>
        <div class="progress"><span id="progressBar"></span></div>
        <div class="tabs">
          <button class="tab active" data-view="answer" type="button">答题</button>
          <button class="tab" data-view="candidate" type="button">候选人</button>
          <button class="tab" data-view="hr" type="button">HR</button>
        </div>
        <p class="notice">候选人界面用于反馈与体验，HR 界面用于内部判断。HR 报告不建议直接展示给候选人。</p>
      </aside>

      <section class="panel main">
        <div class="toolbar">
          <div>
            <div class="section-kicker" id="questionMeta">加载题库中</div>
            <div class="subtitle" id="sectionHint">前 40 题看四灵相工作风格，后 20 题看内在属性。</div>
          </div>
          <select id="jumpSelect" aria-label="跳转题目"></select>
        </div>
        <section class="question-area" id="answerView">
          <article class="game-card">
            <div class="game-head">
              <div>
                <div class="game-kicker">灵相测评</div>
                <div class="game-progress-line"><span id="gameProgress"></span></div>
              </div>
              <div class="game-candidate-pill" id="gameCandidate">候选人：-</div>
            </div>

            <div class="game-question-panel">
              <div class="game-meta-row">
                <span id="gameQuestionNo">第 1 题</span>
                <span id="gameChapter">启程关卡</span>
              </div>
              <h2 class="question-title" id="questionTitle">正在加载题库...</h2>
              <div class="options" id="options"></div>
            </div>

            <section class="level-scene stage-1" id="levelScene" aria-hidden="true">
              <div class="scene-card" id="sceneCard">第 1 题<small>进入当前关卡</small></div>
              <img class="scene-runner-img" id="sceneRunnerImg" src="talent_tool_assets/tiger_white.png" alt="">

            </section>

        </section>
        <section class="report" id="reportView"></section>
        <div class="nav">
          <button class="btn" id="prevBtn" type="button">上一题</button>

        </div>
      </section>
    </div>
  </main>
  <div class="toast" id="toast"></div>

      hint: document.querySelector("#sectionHint"),
      title: document.querySelector("#questionTitle"),
      options: document.querySelector("#options"),
      jump: document.querySelector("#jumpSelect"),
      progress: document.querySelector("#progressBar"),
      progressText: document.querySelector("#progressText"),
      answerCount: document.querySelector("#answerCount"),
      answerView: document.querySelector("#answerView"),
      gameProgress: document.querySelector("#gameProgress"),
      gameCandidate: document.querySelector("#gameCandidate"),
      gameQuestionNo: document.querySelector("#gameQuestionNo"),
      gameChapter: document.querySelector("#gameChapter"),
      levelScene: document.querySelector("#levelScene"),
      sceneCard: document.querySelector("#sceneCard"),
      sceneGate: document.querySelector("#sceneGate"),
      sceneChoices: document.querySelector("#sceneChoices"),
      sceneRunnerImg: document.querySelector("#sceneRunnerImg"),
      reportView: document.querySelector("#reportView"),
      prev: document.querySelector("#prevBtn"),
      next: document.querySelector("#nextBtn"),
      toast: document.querySelector("#toast")
    };

    async function init() {
      try {
        const response = await fetch("talent-assessment-questions.json");
        state.questions = await response.json();
      } catch (error) {
        state.questions = EMBEDDED_QUESTIONS;
      }
      els.date.valueAsDate = new Date();
      restore();
      state.index = 0;
      renderJump();
      render();
      bind();
      setView(hrMode ? "hr" : state.view);
      refreshSubmissions({ silent: true });
    }

    function bind() {
      document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => setView(tab.dataset.view)));
      document.querySelectorAll(".floating-tab[data-view]").forEach(tab => tab.addEventListener("click", () => setView(tab.dataset.view)));
      document.querySelector(".floating-tab[data-action='print']").addEventListener("click", () => {
        if (state.view === "answer") setView("candidate");
        window.print();
      });
      document.querySelector("#sampleBtn").addEventListener("click", fillSample);
      document.querySelector("#resetBtn").addEventListener("click", resetAll);
      document.querySelector("#printBtn").addEventListener("click", () => {
        if (state.view === "answer") setView("candidate");
        window.print();
      });
      els.prev.addEventListener("click", () => { cancelAutoAdvance(); state.index = Math.max(0, state.index - 1); setView("answer"); render(); });
      els.next.addEventListener("click", () => {
        goNextQuestion();
      });
      els.jump.addEventListener("change", () => { cancelAutoAdvance(); state.index = Number(els.jump.value); setView("answer"); render(); });
      [els.name, els.role, els.years, els.date, els.open].forEach(input => input.addEventListener("input", scheduleSave));
      window.addEventListener("pagehide", flushSave);
    }

    function goNextQuestion() {
      cancelAutoAdvance();
      if (state.index < state.questions.length - 1) {
        state.index += 1;
        setView("answer");
      } else {
        setView("candidate");
      }
      render();
    }

    function cancelAutoAdvance() {
      if (state.autoTimer) {
        clearTimeout(state.autoTimer);
        state.autoTimer = null;
      }
    }

    function answerAndAdvance(questionNumber, key) {
      state.answers[questionNumber] = key;
      scheduleSave();
      [els.options, els.sceneChoices].forEach(container => {
        if (!container) return;
        container.querySelectorAll(".selected").forEach(item => item.classList.remove("selected"));
        const selected = container.querySelector(`[data-key="${key}"]`);
        if (selected) selected.classList.add("selected");
      });
      positionRunner(key);
      updateProgress();
      if (state.autoTimer) clearTimeout(state.autoTimer);
      state.autoTimer = setTimeout(() => {
        state.autoTimer = null;
        goNextQuestion();
      }, 450);
    }

    function renderJump() {
      els.jump.innerHTML = state.questions.map((q, index) => `<option value="${index}">第 ${q.number} 题</option>`).join("");
    }

    function setView(view) {
      if (candidateMode && view === "hr") view = "candidate";
      document.body.dataset.view = view;
      if (state.view === view) {
        els.answerView.style.display = view === "answer" ? "block" : "none";
        els.reportView.classList.toggle("active", view !== "answer");
        if (view !== "answer") renderReport();
        return;
      }
      if (view !== "answer") cancelAutoAdvance();
      state.view = view;
      document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.view === view));
      document.querySelectorAll(".floating-tab[data-view]").forEach(tab => tab.classList.toggle("active", tab.dataset.view === view));
      els.answerView.style.display = view === "answer" ? "block" : "none";
      els.reportView.classList.toggle("active", view !== "answer");
      if (view !== "answer") renderReport();
    }

    function render() {
      if (!state.questions.length) return;
      const question = state.questions[state.index];
      const options = question.type === "likert" ? LIKERT_OPTIONS : question.options;
      els.jump.value = String(state.index);
      els.meta.textContent = question.type === "likert"
        ? `第 ${question.number} 题 / 内在属性`
        : `第 ${question.number} 题 / 四灵相工作风格`;
      els.hint.textContent = question.number <= 40 ? "请选择最符合第一反应的选项。" : "请选择最符合真实状态的描述。";
      els.title.textContent = question.title;
      els.options.innerHTML = options.map(option => `
        <div class="option ${state.answers[question.number] === option.key ? "selected" : ""}" data-key="${option.key}" style="--i:${options.indexOf(option)}">
          <span class="letter">${option.key}</span>
          <span>${escapeHtml(option.text)}</span>
        </div>
      `).join("");
      els.options.querySelectorAll(".option").forEach(item => item.addEventListener("click", () => {
        answerAndAdvance(question.number, item.dataset.key);
      }));
      updateProgress();
      updateQuestMap(question, options);
      replayAnswerAnimation();
      els.prev.disabled = state.index === 0;
      els.next.textContent = state.index === state.questions.length - 1 ? "查看候选人结果" : "下一题";
    }

    function updateProgress() {
      const answered = Object.keys(state.answers).length;
      const percent = Math.round(answered / state.questions.length * 100);
      els.progress.style.width = `${percent}%`;
      els.progressText.textContent = `${percent}% 已完成`;
      els.answerCount.textContent = `${answered}/${state.questions.length}`;
    }

    function updateQuestMap(question, options) {
      const chapterIndex = Math.min(questChapters.length - 1, Math.floor((question.number - 1) / 15));
      const chapter = questChapters[chapterIndex];
      const progress = state.questions.length ? ((question.number - 1) / (state.questions.length - 1)) * 100 : 0;
      els.gameProgress.style.width = `${progress}%`;
      els.gameCandidate.textContent = `候选人：${els.name.value || "-"}`;
      els.gameQuestionNo.textContent = `第 ${question.number} 题`;
      els.gameChapter.textContent = `${chapter.title}关卡 · ${chapter.range}题`;
      els.levelScene.className = `level-scene stage-${chapterIndex + 1}`;
      els.sceneCard.innerHTML = `第 ${question.number} 题<small>${chapter.title}关卡 · ${question.type === "likert" ? "内在属性" : "工作风格"}</small>`;
      els.sceneGate.textContent = String(question.number).padStart(2, "0");
      els.sceneRunnerImg.src = answerGuide.src;
      els.sceneRunnerImg.alt = answerGuide.name;
      const currentAnswer = state.answers[question.number];
      els.sceneChoices.innerHTML = options.map((option, index) => {
        return `<button class="scene-choice ${currentAnswer === option.key ? "selected" : ""}" data-key="${option.key}" type="button">${option.key}</button>`;
      }).join("");
      els.sceneChoices.querySelectorAll(".scene-choice").forEach(item => item.addEventListener("click", () => {
        answerAndAdvance(question.number, item.dataset.key);
      }));
      positionRunner(state.answers[question.number]);
    }

    function replayAnswerAnimation() {
      if (answerAnimFrameA) cancelAnimationFrame(answerAnimFrameA);
      if (answerAnimFrameB) cancelAnimationFrame(answerAnimFrameB);
      els.answerView.classList.remove("answer-animate");
      answerAnimFrameA = requestAnimationFrame(() => {
        answerAnimFrameB = requestAnimationFrame(() => {
          if (state.view === "answer") els.answerView.classList.add("answer-animate");
          answerAnimFrameA = 0;
          answerAnimFrameB = 0;
        });
      });
    }

    function positionRunner(key) {
      const positions = {
        A: { left: "27%", shift: "-30%" },
        B: { left: "50%", shift: "0%" },
        C: { left: "68%", shift: "10%" },
        D: { left: "79%", shift: "14%" }
      };
      const target = positions[key] || positions.B;
      els.sceneRunnerImg.style.setProperty("--runner-left", target.left);
      els.sceneRunnerImg.style.setProperty("--runner-shift", target.shift);
    }

    function calculate() {
      const traits = { tiger: 0, peacock: 0, koala: 0, owl: 0 };
      for (let i = 1; i <= 40; i += 1) {
        const answer = state.answers[i];
        if (!answer) continue;
        const optionIndex = CHOICE_KEYS.indexOf(answer);
        const key = TRAIT_MAPS[i - 1][optionIndex];
        traits[key] += 1;
      }
      const likertScore = q => ({ A: 5, B: 4, C: 3, D: 2, E: 1 }[state.answers[q]] || 0);
      const reverse = q => likertScore(q) ? 6 - likertScore(q) : 0;
      const bigFive = {
        extraversion: likertScore(41) + likertScore(55) + likertScore(60) + reverse(46),
        agreeableness: likertScore(47) + likertScore(51) + likertScore(56) + reverse(42),
        conscientiousness: likertScore(43) + likertScore(52) + likertScore(57) + reverse(48),
        emotionalStability: likertScore(49) + likertScore(58) + reverse(44) + reverse(53),
        openness: likertScore(45) + likertScore(50) + likertScore(54) + likertScore(59)
      };
      const values = Object.values(traits);
      const sorted = Object.entries(traits).sort((a, b) => b[1] - a[1]);
      const isBalanced = Math.max(...values) - Math.min(...values) <= 5;
      const leaders = sorted.filter(item => sorted[0][1] - item[1] <= 2).map(item => item[0]);
      const primary = isBalanced ? "chameleon" : leaders[0];
      const completion = Math.round(Object.keys(state.answers).length / 60 * 100);
      const fit = Math.min(99, Math.round(
        completion * 0.25 +
        normalize(bigFive.conscientiousness) * 0.22 +
        normalize(bigFive.agreeableness) * 0.18 +
        normalize(bigFive.emotionalStability) * 0.18 +
        normalize(bigFive.extraversion) * 0.10 +
        normalize(bigFive.openness) * 0.07
      ));
      return { traits, bigFive, primary, leaders, isBalanced, completion, fit };
    }

    function normalize(score) { return Math.round(score / 20 * 100); }
    function level(score) { return score >= 15 ? "高" : score >= 11 ? "中" : "低"; }

    function renderReport() {
      if (!state.questions.length) return;
      if (state.view === "candidate") {
        renderCandidateReport();
        return;
      }
      if (state.view === "hr") {
        renderHrReport();
        return;
      }
    }

    function renderSubmissionDock() {
      const rows = state.submissions.length
        ? state.submissions.map(item => {

          const time = formatSubmissionTime(item.receivedAt || item.submittedAt);
          return `
            <button class="submission-item ${active}" data-submission-id="${escapeHtml(item.id)}" type="button">
              <span>
                <span class="submission-name">${escapeHtml(info.name || "未命名候选人")}</span>
                <span class="submission-meta">${escapeHtml(info.role || "未填写岗位")} · ${escapeHtml(info.date || "-")} · ${time}</span>
              </span>
              <span class="submission-badge">${item.answerCount || Object.keys(item.answers || {}).length}/60 题</span>
            </button>
          `;
        }).join("")
        : `<div class="submission-empty">${state.syncReady ? "还没有收到候选人提交。" : "正在连接候选人提交记录..."}</div>`;
      return `
        <section class="submission-dock">
          <div class="submission-head">
            <div>
              <div class="submission-title">候选人提交记录</div>
              <div class="submission-meta">候选人答完后会自动进入这里，点姓名可载入 HR 报告。</div>
            </div>
            <div class="submission-actions">
              <button class="hr-action" data-sync-action="refresh" type="button">刷新</button>
              <button class="hr-action" data-sync-action="csv" type="button">导出</button>
            </div>
          </div>
          <div class="submission-list">${rows}</div>
        </section>
      `;
    }

    function bindSubmissionDock() {
      els.reportView.querySelectorAll("[data-submission-id]").forEach(button => {
        button.addEventListener("click", () => loadSubmission(button.dataset.submissionId));
      });
      const refresh = els.reportView.querySelector("[data-sync-action='refresh']");
      if (refresh) refresh.addEventListener("click", () => refreshSubmissions({ silent: false }));
      const csv = els.reportView.querySelector("[data-sync-action='csv']");
      if (csv) csv.addEventListener("click", downloadSubmissionsCsv);
    }

    async function refreshSubmissions({ silent = false } = {}) {
      if (candidateMode || state.view !== "hr") return;
      try {
        const response = await fetch(SYNC_API, { cache: "no-store" });
        if (!response.ok) throw new Error("sync unavailable");
        const data = await response.json();
        state.submissions = Array.isArray(data.submissions) ? data.submissions : [];
        state.syncReady = true;
        if (hrMode && state.view === "hr" && state.submissions.length && !state.activeSubmissionId) {
          loadSubmission(state.submissions[0].id, { silent: true });
          return;
        }
        updateSubmissionDock();
        if (!silent) showToast("已刷新候选人提交记录");
      } catch (error) {
        state.syncReady = false;
        updateSubmissionDock();
        if (!silent) showToast("未连接到同步服务，请先启动本地服务");
      }
    }

    function updateSubmissionDock() {
      const dock = els.reportView.querySelector(".submission-dock");
      if (!dock) return;
      dock.outerHTML = renderSubmissionDock();
      bindSubmissionDock();
    }

    function loadSubmission(id, { silent = false } = {}) {
      const record = state.submissions.find(item => item.id === id);
      if (!record) return;
      const info = record.info || {};
      state.activeSubmissionId = id;
      state.answers = { ...(record.answers || {}) };
      state.index = 0;
      els.name.value = info.name || "";
      els.role.value = info.role || "";
      els.years.value = info.years || "";
      els.open.value = info.open || "";
      if (info.date) els.date.value = info.date;
      flushSave();
      renderHrReport();
      if (!silent) showToast(`已载入 ${info.name || "候选人"} 的报告`);
    }

    function formatSubmissionTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return escapeHtml(value);
      return date.toLocaleString("zh-CN", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function downloadSubmissionsCsv() {
      if (!state.submissions.length) {
        showToast("暂无提交记录可导出");
        return;
      }
      const rows = [
        ["候选人", "岗位", "年限", "测评日期", "提交时间", "完成题数", "主类型", "适配度", "开放题"],
        ...state.submissions.map(item => {
          const info = item.info || {};
          const result = item.result || {};
          return [
            info.name || "",
            info.role || "",
            info.years || "",
            info.date || "",
            item.receivedAt || item.submittedAt || "",
            item.answerCount || Object.keys(item.answers || {}).length,
            result.primary || "",
            result.fit ? `${result.fit}%` : "",
            info.open || ""
          ];
        })
      ];
      const csv = "\ufeff" + rows.map(row => row.map(csvCell).join(",")).join("\n");
      const url = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
      const link = document.createElement("a");
      link.href = url;
      link.download = "候选人提交记录.csv";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function downloadHrCsv(result, profile, hrTitle, topBigFive, lowBigFive) {
      const rows = [
        ["字段", "内容"],
        ["候选人", els.name.value || "-"],
        ["测评岗位", els.role.value || "-"],
        ["工作年限", els.years.value || "-"],
        ["报告日期", els.date.value || "-"],
        ["主类型", hrTitle],
        ["岗位适配度", `${result.fit}%`],
        ["老虎", result.traits.tiger],
        ["孔雀", result.traits.peacock],
        ["考拉", result.traits.koala],
        ["猫头鹰", result.traits.owl],
        ["变色龙倾向", result.isBalanced ? "是" : "否"],
        ["外向性", result.bigFive.extraversion],
        ["宜人性", result.bigFive.agreeableness],
        ["尽责性", result.bigFive.conscientiousness],
        ["情绪稳定性", result.bigFive.emotionalStability],
        ["开放性", result.bigFive.openness],
        ["最高维度", `${bigFiveNames[topBigFive[0]]}（${level(topBigFive[1])}）`],
        ["需验证维度", `${bigFiveNames[lowBigFive[0]]}（${level(lowBigFive[1])}）`],
        ["HR岗位匹配", profile.fit.join("、")],
        ["风险点", profile.risks.join("；")],
        ["面试验证重点", profile.interview.join("；")],
        ["开放题记录", els.open.value || "未填写"]
      ];
      const csv = "\ufeff" + rows.map(row => row.map(csvCell).join(",")).join("\n");
      const url = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8" }));
      const link = document.createElement("a");
      link.href = url;
      link.download = `HR测评报告-${els.name.value || "候选人"}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      return `"${String(value ?? "").replaceAll('"', '""')}"`;
    }

    function scoreRows(scores, max, names) {
      return Object.entries(scores).map(([key, value]) => `
        <div class="score-row">
          <span>${names[key]}</span>
          <div class="bar"><span style="width:${Math.round(value / max * 100)}%"></span></div>
          <strong>${value}</strong>
        </div>
      `).join("");
    }

    function fillSample() {
      state.questions.forEach((q, index) => {
        if (q.type === "choice") {
          const preferred = ["owl", "koala", "peacock", "tiger"][index % 4];
          const mapped = TRAIT_MAPS[q.number - 1].indexOf(preferred);
          state.answers[q.number] = CHOICE_KEYS[mapped >= 0 ? mapped : index % 4];
        } else {
          state.answers[q.number] = index % 5 <= 1 ? "B" : "A";
        }
      });
      els.name.value = els.name.value || "演示候选人";
      els.role.value = els.role.value || "游戏公司 HRBP";
      els.years.value = els.years.value || "3 年";
      els.open.value = els.open.value || "候选人认为游戏公司 HR 的价值在于理解业务节奏、连接人才供给与团队文化，并用数据和沟通帮助组织持续迭代。";
      flushSave();
      render();
      setView("candidate");
      showToast("已填入演示答案");
    }

    function resetAll() {
      state.answers = {};
      state.index = 0;
      [els.name, els.role, els.years, els.open].forEach(input => input.value = "");
      els.date.valueAsDate = new Date();
      localStorage.removeItem("talentAssessmentDraft");
      setView("answer");
      render();
    }

    function scheduleSave() {
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(flushSave, 0);
    }

    function flushSave() {
      if (saveTimer) {
        clearTimeout(saveTimer);
        saveTimer = 0;
      }
      localStorage.setItem("talentAssessmentDraft", JSON.stringify({
        answers: state.answers,
        info: { name: els.name.value, role: els.role.value, years: els.years.value, date: els.date.value, open: els.open.value }
      }));
      updateProgress();
      if (state.view !== "answer") renderReport();
    }

    function restore() {
      try {
        const draft = JSON.parse(localStorage.getItem("talentAssessmentDraft") || "{}");
        state.answers = draft.answers || {};
        state.index = 0;
        const info = draft.info || {};
        els.name.value = info.name || "";
        els.role.value = info.role || "";
        els.years.value = info.years || "";
        els.open.value = info.open || "";
        if (info.date) els.date.value = info.date;
      } catch {}
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      setTimeout(() => els.toast.classList.remove("show"), 2200);
    }
    function escapeHtml(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
    }

    init();
  </script>
</body>
</html>
